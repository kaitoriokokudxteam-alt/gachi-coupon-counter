<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガチクーポンカウンター</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DotGothic16', sans-serif;
    background: #0a0a2e;
    min-height: 100vh;
    color: #e0e0e0;
    position: relative;
    overflow-x: hidden;
  }

  /* ===== 背景：星空 ===== */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,200,0.8), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,200,0.6), transparent),
      radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,200,0.9), transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,200,0.5), transparent),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,200,0.7), transparent),
      radial-gradient(1.5px 1.5px at 15% 85%, rgba(255,255,200,0.6), transparent),
      radial-gradient(1px 1px at 45% 45%, rgba(255,255,200,0.4), transparent),
      radial-gradient(1px 1px at 80% 15%, rgba(255,255,200,0.8), transparent),
      radial-gradient(1px 1px at 60% 75%, rgba(255,255,200,0.5), transparent),
      radial-gradient(1.5px 1.5px at 25% 35%, rgba(255,255,200,0.7), transparent);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== RPGウィンドウベース ===== */
  .rpg-window {
    border: 3px solid #c8a84e;
    border-radius: 8px;
    background: rgba(10, 10, 50, 0.92);
    box-shadow:
      inset 0 0 0 2px rgba(200, 168, 78, 0.3),
      0 4px 20px rgba(0, 0, 0, 0.5);
    position: relative;
    z-index: 1;
  }

  /* ===== ヘッダー ===== */
  .header {
    border-bottom: 3px solid #c8a84e;
    background: linear-gradient(180deg, rgba(20,15,60,0.95), rgba(10,10,46,0.98));
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    font-size: 32px;
    line-height: 1;
  }
  .header-title {
    font-size: 22px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
    letter-spacing: 3px;
  }
  .header-subtitle {
    font-size: 11px;
    color: #8888aa;
  }
  .header-right {
    text-align: right;
  }
  .store-name {
    font-size: 16px;
    font-weight: bold;
    color: #ffd700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    text-shadow: 0 0 6px rgba(255, 215, 0, 0.3);
  }
  .store-name:hover { color: #ffe44d; }
  .business-date {
    font-size: 13px;
    color: #8888aa;
    margin-top: 2px;
  }

  /* ===== メインコンテンツ ===== */
  .main {
    max-width: 900px;
    margin: 16px auto;
    padding: 0 12px;
    position: relative;
    z-index: 1;
  }

  /* ===== カウンターペア ===== */
  .counter-pair {
    margin-bottom: 16px;
  }
  .pair-header {
    padding: 10px 20px;
    font-size: 15px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 2px solid rgba(200, 168, 78, 0.4);
  }
  .pair-header.coupon {
    color: #ff6b35;
    text-shadow: 0 0 8px rgba(255, 107, 53, 0.4);
    background: linear-gradient(90deg, rgba(255,107,53,0.15), transparent);
  }
  .pair-header.meishi {
    color: #4dc9f6;
    text-shadow: 0 0 8px rgba(77, 201, 246, 0.4);
    background: linear-gradient(90deg, rgba(77,201,246,0.15), transparent);
  }
  .pair-header.dm {
    color: #f5e642;
    text-shadow: 0 0 8px rgba(245, 230, 66, 0.4);
    background: linear-gradient(90deg, rgba(245,230,66,0.15), transparent);
  }

  .pair-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .counter-card {
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    border-right: 1px solid rgba(200, 168, 78, 0.2);
  }
  .counter-card:last-child { border-right: none; }
  .counter-card.return-card {
    background: rgba(255, 255, 255, 0.02);
  }

  .card-label {
    font-size: 13px;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-label .arrow-out { color: #ff6b6b; }
  .card-label .arrow-in { color: #51cf66; }

  .count-display {
    font-size: 52px;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
    min-width: 100px;
    text-align: center;
    line-height: 1;
    user-select: none;
    transition: transform 0.15s;
  }

  .btn-group {
    display: flex;
    gap: 12px;
  }
  .btn {
    border: 2px solid #c8a84e;
    border-radius: 8px;
    width: 56px;
    height: 56px;
    font-size: 24px;
    font-weight: bold;
    font-family: 'DotGothic16', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.92); }

  .btn-plus {
    background: linear-gradient(180deg, #1a4a2e, #0d2818);
    color: #51cf66;
    text-shadow: 0 0 8px rgba(81, 207, 102, 0.5);
    border-color: #51cf66;
  }
  .btn-plus:hover {
    background: linear-gradient(180deg, #1f5a36, #12331e);
    box-shadow: 0 0 12px rgba(81, 207, 102, 0.3);
  }
  .btn-minus {
    background: linear-gradient(180deg, #4a1a1a, #281010);
    color: #ff6b6b;
    text-shadow: 0 0 8px rgba(255, 107, 107, 0.5);
    border-color: #ff6b6b;
  }
  .btn-minus:hover {
    background: linear-gradient(180deg, #5a1f1f, #331515);
    box-shadow: 0 0 12px rgba(255, 107, 107, 0.3);
  }

  /* ===== 合計バー ===== */
  .total-bar {
    padding: 14px 20px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    text-align: center;
    border-top: 2px solid rgba(200, 168, 78, 0.4);
    margin-top: 4px;
  }
  .total-item { padding: 6px; }
  .total-label {
    font-size: 11px;
    color: #8888aa;
    margin-bottom: 4px;
  }
  .total-value {
    font-size: 20px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
  }

  /* ===== モーダル ===== */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    border: 3px solid #c8a84e;
    border-radius: 12px;
    background: rgba(10, 10, 50, 0.97);
    box-shadow:
      inset 0 0 0 2px rgba(200, 168, 78, 0.3),
      0 8px 40px rgba(0, 0, 0, 0.6);
    padding: 28px;
    max-width: 420px;
    width: 90%;
    text-align: center;
  }
  .modal-icon {
    font-size: 48px;
    margin-bottom: 10px;
  }
  .modal h2 {
    font-size: 20px;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
    margin-bottom: 6px;
  }
  .modal p {
    font-size: 13px;
    color: #8888aa;
    margin-bottom: 16px;
  }
  .store-list {
    list-style: none;
    max-height: 300px;
    overflow-y: auto;
  }
  .store-list li {
    padding: 12px 16px;
    border: 2px solid rgba(200, 168, 78, 0.4);
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    font-size: 15px;
    color: #e0e0e0;
    transition: all 0.12s;
    background: rgba(255, 255, 255, 0.03);
  }
  .store-list li:hover {
    border-color: #ffd700;
    color: #ffd700;
    background: rgba(255, 215, 0, 0.08);
    text-shadow: 0 0 6px rgba(255, 215, 0, 0.3);
  }

  /* 枝番選択ボタン */
  .branch-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 12px;
  }
  .branch-btn {
    border: 2px solid rgba(200, 168, 78, 0.5);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.03);
    color: #e0e0e0;
    font-family: 'DotGothic16', sans-serif;
    font-size: 22px;
    font-weight: bold;
    padding: 16px 0;
    cursor: pointer;
    transition: all 0.12s;
  }
  .branch-btn:hover {
    border-color: #ffd700;
    color: #ffd700;
    background: rgba(255, 215, 0, 0.1);
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.15);
  }

  /* ===== エラー・ローディング ===== */
  .loading {
    text-align: center;
    padding: 60px;
    font-size: 16px;
    color: #8888aa;
    position: relative;
    z-index: 1;
  }
  .loading .spinner {
    font-size: 36px;
    animation: spin 1.5s linear infinite;
    display: inline-block;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    border: 2px solid #ff6b6b;
    border-radius: 8px;
    padding: 10px 16px;
    margin: 12px auto;
    max-width: 900px;
    color: #ff6b6b;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 107, 107, 0.1);
    position: relative;
    z-index: 1;
  }
  .error-banner.hidden { display: none; }

  .config-banner {
    border: 2px solid #4dc9f6;
    border-radius: 8px;
    padding: 14px 18px;
    margin: 12px auto;
    max-width: 900px;
    color: #4dc9f6;
    font-size: 13px;
    line-height: 1.6;
    background: rgba(77, 201, 246, 0.08);
    position: relative;
    z-index: 1;
  }
  .config-banner.hidden { display: none; }

  /* ===== フッター ===== */
  .footer {
    text-align: center;
    padding: 16px;
    color: #555577;
    font-size: 11px;
    position: relative;
    z-index: 1;
  }

  /* ===== カウント変更アニメーション ===== */
  @keyframes dmg-pop {
    0% { transform: scale(1); }
    30% { transform: scale(1.3); text-shadow: 0 0 20px rgba(255,255,255,0.6); }
    100% { transform: scale(1); }
  }
  .count-pop {
    animation: dmg-pop 0.25s ease-out;
  }

  /* ===== スクロールバーRPG風 ===== */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: rgba(10, 10, 50, 0.5); }
  ::-webkit-scrollbar-thumb {
    background: rgba(200, 168, 78, 0.5);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(200, 168, 78, 0.8); }

  /* ===== レスポンシブ ===== */
  @media (max-width: 600px) {
    .header { flex-direction: column; gap: 8px; text-align: center; }
    .header-right { text-align: center; }
    .count-display { font-size: 38px; }
    .btn { width: 48px; height: 48px; font-size: 20px; }
    .total-bar { grid-template-columns: 1fr; }
    .branch-grid { grid-template-columns: repeat(5, 1fr); }
  }
</style>
</head>
<body>

<!-- ===== ヘッダー ===== -->
<div class="header">
  <div class="header-left">
    <span class="header-icon">🔢</span>
    <div>
      <div class="header-title">ガチクーポンカウンター</div>
      <div class="header-subtitle">Gachi Coupon Counter for MOOV</div>
    </div>
  </div>
  <div class="header-right">
    <div class="store-name" id="storeNameDisplay" onclick="showStoreModal()" title="クリックで店舗変更">
      <span id="storeNameText">---</span>
      <span style="font-size:11px">&#9660;</span>
    </div>
    <div class="business-date" id="businessDateDisplay">---</div>
  </div>
</div>

<!-- エラー表示 -->
<div class="error-banner hidden" id="errorBanner">
  <span>&#9888;</span>
  <span id="errorMessage"></span>
</div>

<!-- 設定未完了バナー -->
<div class="config-banner" id="configBanner">
  <strong>&#9881; Supabase未設定</strong><br>
  index.html内の <code>SUPABASE_URL</code> と <code>SUPABASE_ANON_KEY</code> を設定してください。<br>
  詳しくは README.md をご覧ください。
</div>

<!-- ===== メインコンテンツ ===== -->
<div class="main" id="mainContent">
  <div class="loading" id="loadingIndicator">
    <div style="font-size:48px;margin-bottom:16px">&#128295;</div>
    <div>Supabaseの設定が必要です</div>
    <div style="font-size:13px;margin-top:8px;color:#555577">README.mdの手順に従って設定してください</div>
  </div>
</div>

<!-- ===== 店舗選択モーダル ===== -->
<div class="modal-overlay hidden" id="storeModal">
  <div class="modal">
    <div class="modal-icon">🏪</div>
    <h2>店舗を選択してください</h2>
    <p>カウントデータは選択した店舗に紐づけて保存されます</p>
    <ul class="store-list" id="storeList"></ul>
  </div>
</div>

<!-- ===== 枝番選択モーダル ===== -->
<div class="modal-overlay hidden" id="branchModal">
  <div class="modal">
    <div class="modal-icon">🔢</div>
    <h2>カウンター番号を選択</h2>
    <p id="branchStoreLabel">---</p>
    <div class="branch-grid">
      <button class="branch-btn" onclick="selectBranch(1)">1</button>
      <button class="branch-btn" onclick="selectBranch(2)">2</button>
      <button class="branch-btn" onclick="selectBranch(3)">3</button>
      <button class="branch-btn" onclick="selectBranch(4)">4</button>
      <button class="branch-btn" onclick="selectBranch(5)">5</button>
    </div>
  </div>
</div>

<script>
// ===========================================
// 設定 - Supabase接続情報
// ===========================================
const SUPABASE_URL = 'https://xjyqbxvthjjimrvcvaih.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqeXFieHZ0aGpqaW1ydmN2YWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzkzNzAsImV4cCI6MjA4OTAxNTM3MH0.VlWbEr4HB66oJrdg55i9z8Llvi87BGmnpHgDLLU8sos';

// ===========================================
// カテゴリ定義
// ===========================================
const CATEGORIES = [
  {
    group: 'ビギナーズクーポン',
    icon: '🔥',
    colorClass: 'coupon',
    items: [
      { key: 'beginners_coupon_out', label: '配布', direction: 'out' },
      { key: 'beginners_coupon_return', label: '戻り', direction: 'in' },
    ]
  },
  {
    group: '名刺',
    icon: '❄️',
    colorClass: 'meishi',
    items: [
      { key: 'meishi_out', label: '配布', direction: 'out' },
      { key: 'meishi_return', label: '戻り', direction: 'in' },
    ]
  },
  {
    group: 'お礼DM',
    icon: '⚡',
    colorClass: 'dm',
    items: [
      { key: 'thanks_dm_out', label: '配布', direction: 'out' },
      { key: 'thanks_dm_return', label: '戻り', direction: 'in' },
    ]
  },
];

// ===========================================
// グローバル変数
// ===========================================
let db = null;
let currentStore = null;
let currentBranch = 1;
let counters = {};
let isConfigured = false;

// ===========================================
// 営業日計算（7時区切り）
// ===========================================
function getBusinessDate() {
  const now = new Date();
  if (now.getHours() < 7) {
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    return formatDate(yesterday);
  }
  return formatDate(now);
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDateJP(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

// ===========================================
// 初期化
// ===========================================
async function init() {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL' || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY') {
    isConfigured = false;
    return;
  }

  document.getElementById('configBanner').classList.add('hidden');
  document.getElementById('loadingIndicator').innerHTML =
    '<div class="spinner">&#x1F50E;</div><div>データを読み込んでいます...</div>';

  isConfigured = true;

  try {
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (e) {
    showError('Supabaseへの接続に失敗しました: ' + e.message);
    return;
  }

  const businessDate = getBusinessDate();
  document.getElementById('businessDateDisplay').textContent = formatDateJP(businessDate);

  const savedStoreId = localStorage.getItem('gachi_counter_store_id');
  const savedStoreName = localStorage.getItem('gachi_counter_store_name');
  const savedBranch = localStorage.getItem('gachi_counter_branch');

  if (savedStoreId && savedStoreName && savedBranch) {
    currentStore = { id: savedStoreId, name: savedStoreName };
    currentBranch = parseInt(savedBranch);
    document.getElementById('storeNameText').textContent = `${savedStoreName} #${currentBranch}`;
    await loadCounters();
  } else {
    await showStoreModal();
  }
}

// ===========================================
// 店舗選択
// ===========================================
async function showStoreModal() {
  if (!isConfigured) return;

  const modal = document.getElementById('storeModal');
  const list = document.getElementById('storeList');
  list.innerHTML = '<li style="color:#555577;cursor:default">読み込み中...</li>';
  modal.classList.remove('hidden');

  try {
    const { data, error } = await db.from('stores').select('*').order('name');
    if (error) throw error;

    if (!data || data.length === 0) {
      list.innerHTML = '<li style="color:#555577;cursor:default">店舗データがありません</li>';
      return;
    }

    list.innerHTML = '';
    data.forEach(store => {
      const li = document.createElement('li');
      li.textContent = store.name;
      li.onclick = () => selectStore(store);
      list.appendChild(li);
    });
  } catch (e) {
    showError('店舗データの取得に失敗しました: ' + e.message);
    list.innerHTML = '<li style="color:#ff6b6b;cursor:default">エラーが発生しました</li>';
  }
}

function selectStore(store) {
  currentStore = store;
  localStorage.setItem('gachi_counter_store_id', store.id);
  localStorage.setItem('gachi_counter_store_name', store.name);
  document.getElementById('storeModal').classList.add('hidden');
  showBranchModal();
}

// ===========================================
// 枝番選択
// ===========================================
function showBranchModal() {
  document.getElementById('branchStoreLabel').textContent =
    `${currentStore.name} のカウンター番号を選んでください`;
  document.getElementById('branchModal').classList.remove('hidden');
}

function selectBranch(num) {
  currentBranch = num;
  localStorage.setItem('gachi_counter_branch', num);
  document.getElementById('storeNameText').textContent = `${currentStore.name} #${currentBranch}`;
  document.getElementById('branchModal').classList.add('hidden');
  loadCounters();
}

// ===========================================
// カウンターデータ読み込み
// ===========================================
async function loadCounters() {
  const businessDate = getBusinessDate();

  try {
    const { data, error } = await db
      .from('counts')
      .select('*')
      .eq('store_id', currentStore.id)
      .eq('branch_number', currentBranch)
      .eq('business_date', businessDate);

    if (error) throw error;

    counters = {};
    CATEGORIES.forEach(cat => {
      cat.items.forEach(item => {
        counters[item.key] = 0;
      });
    });

    if (data) {
      data.forEach(row => {
        counters[row.category] = row.count;
      });
    }

    renderCounters();
  } catch (e) {
    showError('データの読み込みに失敗しました: ' + e.message);
  }
}

// ===========================================
// カウンター表示
// ===========================================
function renderCounters() {
  const main = document.getElementById('mainContent');
  let html = '<div class="rpg-window">';

  CATEGORIES.forEach(cat => {
    html += `
      <div class="counter-pair">
        <div class="pair-header ${cat.colorClass}">
          <span>${cat.icon}</span>
          <span>${cat.group}</span>
        </div>
        <div class="pair-body">`;

    cat.items.forEach(item => {
      const isReturn = item.direction === 'in';
      const arrowClass = isReturn ? 'arrow-in' : 'arrow-out';
      const arrow = isReturn ? '&#8592; ' : '&#8594; ';
      html += `
          <div class="counter-card ${isReturn ? 'return-card' : ''}">
            <div class="card-label">
              <span class="${arrowClass}">${arrow}</span>${item.label}
            </div>
            <div class="count-display" id="count-${item.key}">${counters[item.key]}</div>
            <div class="btn-group">
              <button class="btn btn-minus" onclick="updateCount('${item.key}', -1)" title="1減らす">−</button>
              <button class="btn btn-plus" onclick="updateCount('${item.key}', 1)" title="1増やす">＋</button>
            </div>
          </div>`;
    });

    html += `
        </div>
      </div>`;
  });

  // 合計バー
  html += `
    <div class="total-bar">
      ${CATEGORIES.map(cat => {
        const outKey = cat.items.find(i => i.direction === 'out').key;
        const inKey = cat.items.find(i => i.direction === 'in').key;
        const net = counters[outKey] - counters[inKey];
        return `
          <div class="total-item">
            <div class="total-label">${cat.icon} ${cat.group} 残</div>
            <div class="total-value" id="net-${cat.colorClass}">${net}</div>
          </div>`;
      }).join('')}
    </div>`;

  html += '</div>'; // rpg-window

  // フッター
  html += `
    <div class="footer">
      🔢 ガチクーポンカウンター v2.0 | 営業日: ${formatDateJP(getBusinessDate())}
    </div>`;

  main.innerHTML = html;
}

// ===========================================
// カウント更新
// ===========================================
async function updateCount(category, delta) {
  const newCount = counters[category] + delta;
  if (newCount < 0) return;

  counters[category] = newCount;
  const el = document.getElementById(`count-${category}`);
  if (el) {
    el.textContent = newCount;
    el.classList.remove('count-pop');
    void el.offsetWidth; // reflow
    el.classList.add('count-pop');
  }

  updateTotals();

  const businessDate = getBusinessDate();
  try {
    const { error } = await db
      .from('counts')
      .upsert({
        store_id: currentStore.id,
        branch_number: currentBranch,
        business_date: businessDate,
        category: category,
        count: newCount,
      }, {
        onConflict: 'store_id,branch_number,business_date,category'
      });

    if (error) throw error;
    hideError();
  } catch (e) {
    counters[category] = newCount - delta;
    if (el) el.textContent = counters[category];
    updateTotals();
    showError('保存に失敗しました: ' + e.message);
  }
}

function updateTotals() {
  CATEGORIES.forEach(cat => {
    const outKey = cat.items.find(i => i.direction === 'out').key;
    const inKey = cat.items.find(i => i.direction === 'in').key;
    const net = counters[outKey] - counters[inKey];
    const el = document.getElementById(`net-${cat.colorClass}`);
    if (el) el.textContent = net;
  });
}

// ===========================================
// エラー表示
// ===========================================
function showError(msg) {
  const banner = document.getElementById('errorBanner');
  document.getElementById('errorMessage').textContent = msg;
  banner.classList.remove('hidden');
}

function hideError() {
  document.getElementById('errorBanner').classList.add('hidden');
}

// ===========================================
// 営業日切り替え監視（毎分チェック）
// ===========================================
let lastBusinessDate = getBusinessDate();
setInterval(() => {
  const currentDate = getBusinessDate();
  if (currentDate !== lastBusinessDate) {
    lastBusinessDate = currentDate;
    document.getElementById('businessDateDisplay').textContent = formatDateJP(currentDate);
    if (currentStore) loadCounters();
  }
}, 60000);

// ===========================================
// 起動
// ===========================================
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

</html>
